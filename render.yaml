# ============================================================
# render.yaml — WH-ED Mentorship App on Render Free Tier
# ============================================================
#
# Deploy steps:
# 1. Push this file + app to GitHub
# 2. Go to https://render.com/blueprints
# 3. Click "New Blueprint Instance" → connect your GitHub repo
# 4. Render reads this file and provisions:
#    - PostgreSQL database (free, 500MB)
#    - Next.js web service (free, sleeps after 15min idle)
# 5. After deploy, go to PostgreSQL → connect string, set as env var
# 6. Run schema: psql $INTERNAL_CONNECTION_STRING < db/schema.sql
#
# NOTE: Free PostgreSQL sleeps after 90 days of inactivity.
# Keep the app active or use a Uptime Robot ping to prevent sleep.
# ============================================================

services:
  # ── PostgreSQL Database ───────────────────────────────────
  - type: postgres
    name: wh-ed-mentorship-db
    plan: free
    databaseName: wh_ed_mentorship
    ipAllowList: []

  # ── Next.js Web App ────────────────────────────────────────
  - type: web
    name: wh-ed-mentorship
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm run build
    startCommand: bash scripts/render-init.sh && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_NAME
        value: wh-ed-mentorship
      # JWT secret — generate with: openssl rand -hex 32
      - key: JWT_SECRET
        generateValue: true
      # Point to Render's internal PostgreSQL (no password needed from web service)
      - key: DATABASE_URL
        fromDatabase:
          name: wh-ed-mentorship-db
          property: connectionString